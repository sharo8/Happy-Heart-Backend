services:
  postgres:
    image: postgres:15
    container_name: happyhearts-postgres
    environment:
      POSTGRES_DB: happyhearts_db
      POSTGRES_USER: happyhearts
      POSTGRES_PASSWORD: strongpassword123
    ports:
      - "5432:5432"
    volumes:
      - happyhearts_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U happyhearts -d happyhearts_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: happyhearts-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/happyhearts_db
      SPRING_DATASOURCE_USERNAME: happyhearts
      SPRING_DATASOURCE_PASSWORD: strongpassword123
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret-min-256-bits-for-production}
      RFID_API_KEY: ${RFID_API_KEY:-dev-rfid-api-key-change-in-production}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
    restart: unless-stopped

volumes:
  happyhearts_pgdata:
